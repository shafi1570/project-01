<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Registration Successful</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#070b12,#111827,#0b1020);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.success-box{
background:#111827;
padding:50px;
border-radius:25px;
text-align:center;
max-width:700px;
width:90%;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 35px rgba(0,191,255,.25);
animation:pop .6s ease;
}

.success-icon{
font-size:90px;
margin-bottom:20px;
animation:bounce 1.5s infinite;
}

h1{
font-size:45px;
font-weight:bold;
color:#00ff99;
margin-bottom:15px;
}

p{
color:#c7d5e0;
font-size:18px;
line-height:1.8;
margin-bottom:30px;
}

.info-box{
background:#0b1020;
padding:20px;
border-radius:15px;
margin-bottom:25px;
border:1px solid rgba(255,255,255,.08);
}

.info-box h4{
color:#00bfff;
margin-bottom:10px;
}

.btn-home{
background:#00bfff;
color:white;
font-weight:bold;
padding:12px 30px;
border:none;
border-radius:12px;
text-decoration:none;
transition:.3s;
}

.btn-home:hover{
background:#0099cc;
color:white;
}

.btn-event{
background:#ff004c;
color:white;
font-weight:bold;
padding:12px 30px;
border:none;
border-radius:12px;
text-decoration:none;
margin-left:10px;
transition:.3s;
}

.btn-event:hover{
background:#d90042;
color:white;
}

@keyframes pop{

0%{
transform:scale(.8);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

@media(max-width:768px){

h1{
font-size:32px;
}

.success-box{
padding:30px;
}

.btn-home,
.btn-event{
display:block;
margin:10px auto;
width:100%;
}

}

</style>

</head>

<body>

<div class="success-box">

<div class="success-icon">
🎉
</div>

<h1>
Registration Successful
</h1>

<p>
Thank you for registering for the ASUS
Vibe Coding With AI Workshop.
Your registration has been submitted successfully.
</p>

<div class="info-box">

<h4>What's Next?</h4>

<p>
📧 Confirmation Email Soon<br>
🎓 Free Workshop Access<br>
🤖 AI Learning Sessions<br>
🚀 Future ASUS Event Updates
</p>

</div>

<a href="index.html"
class="btn-home">
🏠 Back To Home
</a>

<a href="plain.html"
class="btn-event">
🎮 More Events
</a>

</div>

</body>

</html>
