<!DOCTYPE html>
<html>

<head>

<title>Invoice</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="invoice.css">

</head>

<body>

<div class="container py-5">

<h1 class="text-center text-info mb-4">
Invoice
</h1>

<!-- CUSTOMER + PRODUCTS -->
<div id="invoice-box"></div>

<!-- TOTAL -->
<div class="total-box mt-4">

<h2>
Total:
₹<span id="total">0</span>
</h2>

<button class="btn btn-info w-100 mt-3"
onclick="finish()">
Finish Purchase
</button>

</div>

</div>

<script src="invoice.js"></script>

</body>

</html>
