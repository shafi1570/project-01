<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Successful</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#05070d,#0b1f35,#101827);
color:white;
}

.box{

width:90%;
max-width:500px;

background:#111827;

padding:35px;

border-radius:18px;

text-align:center;

box-shadow:0 0 25px rgba(0,191,255,.25);

}

.check{

font-size:80px;

color:#00ff99;

margin-bottom:20px;

}

h1{

color:#00bfff;

margin-bottom:15px;

}

p{

color:#d1d5db;

line-height:1.7;

margin-bottom:10px;

}

.order{

margin:20px 0;

padding:15px;

background:#1f2937;

border-radius:10px;

font-size:18px;

font-weight:bold;

}

button{

margin-top:15px;

padding:12px 25px;

border:none;

border-radius:10px;

background:#00bfff;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#0099cc;

}

</style>

</head>

<body>

<div class="box">

<div class="check">✅</div>

<h1>Order Placed Successfully</h1>

<p>
Thank you for shopping with ASUS Store.
</p>

<div class="order">
Order ID :
<span id="orderId"></span>
</div>

<p>
Estimated Delivery:
3 - 5 Business Days
</p>

<button onclick="window.location.href='product.html'">
Continue Shopping
</button>

<button onclick="window.location.href='index.html'">
Go Home
</button>

</div>

<script>

let id="ASUS"+Math.floor(Math.random()*1000000);

document.getElementById("orderId").innerHTML=id;

</script>

</body>
</html>
