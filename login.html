<!DOCTYPE html>
<html>
<head>
<title>Login / Register</title>
<style>
body{
background:#0b0f17;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111827;
padding:30px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
background:#00bfff;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

.toggle{
margin-top:10px;
color:#aaa;
cursor:pointer;
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h2 id="title">Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="auth()">Submit</button>

<div class="toggle" onclick="toggle()">
Switch
</div>

</div>

<script>

let mode = "login";

function toggle(){
mode = (mode==="login") ? "register" : "login";
document.getElementById("title").innerText = mode.toUpperCase();
}

function auth(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(mode === "register"){
localStorage.setItem("user", JSON.stringify({u,p}));
alert("Registered!");
}

else{
let data = JSON.parse(localStorage.getItem("user"));

if(data && data.u===u && data.p===p){
localStorage.setItem("logged", "true");
alert("Login success");
window.location.href="index.html";
}else{
alert("Wrong login");
}
}

}

</script>

</body>
</html>
