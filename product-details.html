<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0b0f19;
color:white;
}

/* NAV */

nav{
background:#111827;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00bfff;
}

.back-btn{
color:#00bfff;
text-decoration:none;
font-weight:bold;
}

/* MAIN */

.main-container{
display:grid;
grid-template-columns:1.1fr 1fr;
gap:40px;
padding:40px;
}

/* LEFT SIDE */

.left-section{
display:flex;
flex-direction:column;
gap:20px;
}

/* MAIN IMAGE */

.main-image{
background:#111827;
padding:15px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
}

.main-image img{
width:100%;
height:500px;
object-fit:cover;
border-radius:12px;
transition:0.3s;
}

/* THUMBNAILS */

.gallery{
display:flex;
gap:15px;
overflow-x:auto;
padding-bottom:10px;
}

.gallery img{
width:120px;
height:90px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
transition:0.3s;
background:#111827;
padding:4px;
}

.gallery img:hover{
border-color:#00bfff;
transform:scale(1.05);
}

/* RIGHT SECTION */

.right-section{
background:#111827;
padding:30px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
height:max-content;
}

/* PRODUCT NAME */

.product-name{
font-size:38px;
margin-bottom:10px;
}

/* PRICE */

.price{
font-size:34px;
font-weight:bold;
color:#00ff99;
margin:15px 0;
}

/* BADGES */

.badges{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.badge{
background:#1f2937;
padding:8px 15px;
border-radius:50px;
font-size:14px;
color:#00bfff;
border:1px solid rgba(0,191,255,0.3);
}

/* SPECS */

.spec-title{
font-size:24px;
margin:25px 0 15px;
color:#00bfff;
}

.spec{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.06);
font-size:15px;
color:#d1d5db;
}

/* BUTTONS */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

.cart-btn{
background:#00bfff;
color:white;
}

.cart-btn:hover{
background:#0099cc;
transform:translateY(-2px);
}

.buy-btn{
background:#00ff99;
color:black;
}

.buy-btn:hover{
transform:translateY(-2px);
}

/* DELIVERY */

.delivery{
margin-top:25px;
background:#0b1220;
padding:18px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
}

.delivery h4{
margin-bottom:10px;
color:#00bfff;
}

.delivery p{
color:#ccc;
font-size:14px;
line-height:1.7;
}

/* RESPONSIVE */

@media(max-width:900px){

.main-container{
grid-template-columns:1fr;
padding:20px;
}

.main-image img{
height:320px;
}

.product-name{
font-size:28px;
}

.price{
font-size:28px;
}

.gallery img{
width:90px;
height:70px;
}

}

</style>

/* ADD TO CART */

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* Already in cart */

let existing = cart.find(item => item.name === p.name);

if(existing){

existing.qty++;

}else{

cart.push({

name:p.name,
price:p.price,
img:p.img,
qty:1

});

}

localStorage.setItem("cart",JSON.stringify(cart));

alert("✅ Added To Cart");

}
