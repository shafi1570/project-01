<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register - ASUS Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="login.css">

</head>

<body>

    

<div class="login-container">

<div class="login-box">

<h1>Create Account</h1>

<p>Join ASUS Store</p>

<input type="text"
id="registerUser"
class="form-control mb-3"
placeholder="Username">

<input type="password"
id="registerPass"
class="form-control mb-3"
placeholder="Password">

<button class="btn btn-info w-100"
onclick="register()">
REGISTER
</button>

<div class="links">

<a href="login.html">
Already have account?
</a>

<a href="index.html">
Back Home
</a>

</div>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
